// Find team code from any variation
function findTeamCode(teamText) {
    const normalized = teamText.toLowerCase().replace(/[^a-z]/g, '');
    
    for (const [code, variations] of Object.entries(teamMappings)) {
        for (const variation of variations) {
            const varNorm = variation.replace(/[^a-z]/g, '');
            if (normalized === varNorm || normalized.includes(varNorm) || varNorm.includes(normalized)) {
                return code;
            }
        }
    }
    
    return null;
// Global state

let currentSport = null;

    const provider = new firebase.auth.GoogleAuthProvider();

        currentUser = user;
        document.getElementById('login-screen').classList.add('hidden');
        
        const savedSport = localStorage.getItem('selectedSport');
        const savedApiKey = localStorage.getItem('oddsApiKey');

            oddsApiKey = savedApiKey;
            showMainApp();
        } else {
            document.getElementById('sport-selection-screen').classList.remove('hidden');

        document.getElementById('sport-selection-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.add('hidden');
    }
});

function selectSport(sport) {
    const apiKey = document.getElementById('odds-api-key').value.trim();
    if (!apiKey) {
        alert('Please enter your Odds API key');
        return;
    }
    
    currentSport = sport;
    oddsApiKey = apiKey;
    
    localStorage.setItem('selectedSport', sport);
    localStorage.setItem('oddsApiKey', apiKey);
    
    showMainApp();
}

function changeSport() {
    localStorage.removeItem('selectedSport');
    localStorage.removeItem('oddsApiKey');
    document.getElementById('app-screen').classList.add('hidden');
    document.getElementById('sport-selection-screen').classList.remove('hidden');
}

function showMainApp() {
    document.getElementById('sport-selection-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    
    const sportNames = {
        'basketball_nba': 'NBA',
        'baseball_mlb': 'MLB',
        'americanfootball_nfl': 'NFL',
        'icehockey_nhl': 'NHL'
    };
    document.getElementById('sport-title').textContent = sportNames[currentSport] + ' Contrarian Tracker';
    
    loadData();
}

function loadData() {
    if (!currentUser) return;
    
    const sportKey = currentSport.replace('_', '-');
    
    db.ref(`games/${currentUser.uid}/${sportKey}`).on('value', snap => {
        games = [];
        snap.forEach(child => {
            games.push({ key: child.key, ...child.val() });
        });
        renderGames();
    });
    
    db.ref(`results/${currentUser.uid}/${sportKey}`).on('value', snap => {
        results = [];
        snap.forEach(child => {
            results.push({ key: child.key, ...child.val() });
        });
        renderResults();
    });
}

async function fetchBovadaOdds() {
    if (!oddsApiKey) {
        alert('❌ API key not found');
        return;
    }
    
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⏳ Fetching...';
    
    try {
        const response = await fetch(
            `https://api.the-odds-api.com/v4/sports/${currentSport}/odds/?apiKey=${oddsApiKey}&regions=us&markets=spreads,h2h&bookmakers=bovada`
        );
        
        if (!response.ok) {
            throw new Error(`API Error: ${response.status}`);
        }
        
        const data = await response.json();
        bovadaOdds = data;
        
        alert(`✅ Fetched ${data.length} games from Bovada\n\nRemaining: ${response.headers.get('x-requests-remaining') || 'Unknown'}`);
    } catch (err) {
        alert('❌ Failed: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Fetch Bovada Odds';
    }
}

function calcImpliedProb(moneyline) {
    if (moneyline < 0) {
        return (Math.abs(moneyline) / (Math.abs(moneyline) + 100)) * 100;
    } else {
        return (100 / (moneyline + 100)) * 100;
    }
}

function importData() {
    const text = document.getElementById('import-text').value.trim();
    if (!text) {
        alert('Please paste SBD data');
        return;
    }
    
    if (bovadaOdds.length === 0) {
        alert('Please fetch Bovada odds first');
        return;
    }
    
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const imported = [];
    const failed = [];
    
    for (let line of lines) {
        const parts = line.split(/\s+/);
        if (parts.length < 3) continue;
        
        const team = parts[0];
        const percentages = parts.filter(p => p.includes('%')).map(p => parseFloat(p.replace('%', '')));
        
        let spreadMoney = null;
        let mlMoney = null;
        
        if (percentages.length === 4) {
            spreadMoney = percentages[1];
            mlMoney = percentages[3];
        } else if (percentages.length === 2) {
            spreadMoney = percentages[0];
            mlMoney = percentages[1];
        }
        
        if (spreadMoney === null || mlMoney === null) {
            failed.push({ team, reason: 'Could not parse percentages' });
            continue;
        }
        
        const bovadaGame = findBovadaMatch(team);
        if (!bovadaGame) {
            failed.push({ team, reason: 'No Bovada match' });
            continue;
        }
        
        imported.push({
            team,
            spreadMoney,
            mlMoney,
            bovadaSpread: bovadaGame.spread,
            bovadaML: bovadaGame.moneyline
        });
    }
    
    if (failed.length > 0 && imported.length === 0) {
        alert(`❌ Import failed:\n\n${failed.map(f => `${f.team}: ${f.reason}`).join('\n')}`);
        return;
    }
    
    if (imported.length === 0) {
        alert('No matches found');
        return;
    }
    
    const sportKey = currentSport.replace('_', '-');
    imported.forEach(game => {
        const spreadGap = 50 - game.spreadMoney;
        const mlImplied = calcImpliedProb(game.bovadaML);
        const mlGap = mlImplied - game.mlMoney;
        
        db.ref(`games/${currentUser.uid}/${sportKey}`).push({
            team: game.team,
            spreadMoney: game.spreadMoney,
            mlMoney: game.mlMoney,
            bovadaSpread: game.bovadaSpread,
            bovadaML: game.bovadaML,
            spreadGap: Math.round(spreadGap * 10) / 10,
            mlGap: Math.round(mlGap * 10) / 10,
            timestamp: Date.now()
        });
    });
    
    alert(`✅ Imported ${imported.length} games`);
    document.getElementById('import-text').value = '';
}

function findBovadaMatch(sbdTeam) {
    const teamCode = findTeamCode(sbdTeam);
    if (!teamCode) return null;
    
    for (let game of bovadaOdds) {
        const homeCode = findTeamCode(game.home_team);
        const awayCode = findTeamCode(game.away_team);
        
        if (teamCode === homeCode || teamCode === awayCode) {
            const bovada = game.bookmakers?.find(b => b.key === 'bovada');
            if (!bovada) continue;
            
            const spreads = bovada.markets.find(m => m.key === 'spreads');
            const h2h = bovada.markets.find(m => m.key === 'h2h');
            
            if (!spreads || !h2h) continue;
            
            const isHome = teamCode === homeCode;
            const teamIndex = isHome ? 0 : 1;
            
            return {
                spread: spreads.outcomes[teamIndex]?.point || 0,
                moneyline: h2h.outcomes[teamIndex]?.price || 0
            };
        }
    }
    
    return null;
}

function renderGames() {
    const sortBy = document.getElementById('sort-by')?.value || 'largest';
    
    const sorted = [...games].sort((a, b) => {
        if (sortBy === 'spread') {
            return Math.abs(b.spreadGap || 0) - Math.abs(a.spreadGap || 0);
        } else if (sortBy === 'ml') {
            return Math.abs(b.mlGap || 0) - Math.abs(a.mlGap || 0);
        } else {
            const aMax = Math.max(Math.abs(a.spreadGap || 0), Math.abs(a.mlGap || 0));
            const bMax = Math.max(Math.abs(b.spreadGap || 0), Math.abs(b.mlGap || 0));
            return bMax - aMax;
        }
    });
    
    const html = sorted.map(game => {
        const spreadClass = game.spreadGap > 0 ? 'gap-positive' : 'gap-negative';
        const mlClass = game.mlGap > 0 ? 'gap-positive' : 'gap-negative';
        
        return `
            <div class="game-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="font-size: 22px; margin-bottom: 8px;">${game.team}</h3>
                        <div style="color: #94a3b8; font-size: 13px;">
                            Bovada: ${game.bovadaSpread > 0 ? '+' : ''}${game.bovadaSpread} / ${game.bovadaML > 0 ? '+' : ''}${game.bovadaML}
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div style="margin-bottom: 8px;">
                            <span style="color: #94a3b8; font-size: 12px;">SPREAD:</span>
                            <span class="gap-display ${spreadClass}">${game.spreadGap > 0 ? '+' : ''}${game.spreadGap}</span>
                        </div>
                        <div>
                            <span style="color: #94a3b8; font-size: 12px;">ML:</span>
                            <span class="gap-display ${mlClass}">${game.mlGap > 0 ? '+' : ''}${game.mlGap}</span>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 12px; display: flex; gap: 10px;">
                    <button onclick="logResult('${game.key}', 'win')" class="btn-primary" style="flex: 1;">✅ Win</button>
                    <button onclick="logResult('${game.key}', 'loss')" class="btn-secondary" style="flex: 1;">❌ Loss</button>
                    <button onclick="deleteGame('${game.key}')" class="btn-secondary">🗑️</button>
                </div>
            </div>
        `;
    }).join('');
    
    document.getElementById('games-list').innerHTML = html || '<p style="color: #64748b; text-align: center; padding: 40px;">No games yet. Import data to get started.</p>';
}

function logResult(gameKey, outcome) {
    const game = games.find(g => g.key === gameKey);
    if (!game) return;
    
    const sportKey = currentSport.replace('_', '-');
    
    db.ref(`results/${currentUser.uid}/${sportKey}`).push({
        team: game.team,
        spreadGap: game.spreadGap,
        mlGap: game.mlGap,
        outcome,
        timestamp: Date.now()
    });
    
    deleteGame(gameKey);
}

function deleteGame(gameKey) {
    const sportKey = currentSport.replace('_', '-');
    db.ref(`games/${currentUser.uid}/${sportKey}/${gameKey}`).remove();
}

function clearAllGames() {
    if (!confirm('Delete all games?')) return;
    const sportKey = currentSport.replace('_', '-');
    db.ref(`games/${currentUser.uid}/${sportKey}`).remove();
}

function renderResults() {
    const wins = results.filter(r => r.outcome === 'win').length;
    const losses = results.filter(r => r.outcome === 'loss').length;
    const total = wins + losses;
    const winRate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
    
    document.getElementById('results-stats').innerHTML = `
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center;">
            <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; padding: 16px;">
                <div style="font-size: 28px; font-weight: 700; color: #10b981;">${wins}</div>
                <div style="color: #94a3b8; font-size: 12px;">WINS</div>
            </div>
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px; padding: 16px;">
                <div style="font-size: 28px; font-weight: 700; color: #ef4444;">${losses}</div>
                <div style="color: #94a3b8; font-size: 12px;">LOSSES</div>
            </div>
            <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 12px; padding: 16px;">
                <div style="font-size: 28px; font-weight: 700; color: #3b82f6;">${winRate}%</div>
                <div style="color: #94a3b8; font-size: 12px;">WIN RATE</div>
            </div>
        </div>
    `;
    
    const recent = [...results].reverse().slice(0, 10);
    const html = recent.map(r => `
        <div style="display: flex; justify-content: space-between; padding: 12px; background: rgba(15, 23, 42, 0.4); border-radius: 8px; margin: 8px 0;">
            <span>${r.team}</span>
            <span style="color: ${r.outcome === 'win' ? '#10b981' : '#ef4444'};">
                ${r.outcome === 'win' ? '✅ Win' : '❌ Loss'}
            </span>
        </div>
    `).join('');
    
    document.getElementById('results-list').innerHTML = html || '<p style="color: #64748b; text-align: center;">No results yet</p>';
}

</script>
</body>
</html>

}
