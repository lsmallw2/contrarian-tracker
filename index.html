<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrarian Edge Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; color: white; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        button { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
        textarea, input { width: 100%; padding: 12px; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 10px; font-size: 14px; margin: 8px 0; background: rgba(30, 41, 59, 0.4); color: white; }
        .game-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8)); border: 1px solid rgba(148, 163, 184, 0.15); border-radius: 16px; padding: 20px; margin: 14px 0; }
        .hidden { display: none !important; }
        .gap-display { display: inline-block; padding: 8px 16px; border-radius: 8px; font-weight: 700; margin: 0 8px; }
        .gap-positive { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .gap-negative { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

<div id="login-screen" class="container" style="text-align: center; padding-top: 100px;">
    <h1 style="font-size: 42px; margin-bottom: 12px;">Contrarian Edge</h1>
    <p style="color: #94a3b8; margin-bottom: 40px;">Professional betting intelligence</p>
    <button onclick="doSignIn()" class="btn-primary" style="font-size: 16px; padding: 16px 48px;">Sign in with Google</button>
</div>

<div id="sport-selection-screen" class="hidden">
    <div class="container" style="text-align: center; padding-top: 60px;">
        <h1 style="font-size: 36px; margin-bottom: 20px;">Select Sport</h1>
        <div style="max-width: 400px; margin: 0 auto 30px;">
            <input type="text" id="odds-api-key" placeholder="The Odds API Key" style="margin-bottom: 10px;">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto;">
            <button onclick="selectSport('basketball_nba')" class="btn-primary" style="padding: 30px; font-size: 18px;"><div style="font-size: 40px; margin-bottom: 8px;">🏀</div>NBA</button>
            <button onclick="selectSport('baseball_mlb')" class="btn-primary" style="padding: 30px; font-size: 18px;"><div style="font-size: 40px; margin-bottom: 8px;">⚾</div>MLB</button>
            <button onclick="selectSport('americanfootball_nfl')" class="btn-primary" style="padding: 30px; font-size: 18px;"><div style="font-size: 40px; margin-bottom: 8px;">🏈</div>NFL</button>
            <button onclick="selectSport('icehockey_nhl')" class="btn-primary" style="padding: 30px; font-size: 18px;"><div style="font-size: 40px; margin-bottom: 8px;">🏒</div>NHL</button>
        </div>
    </div>
</div>

<div id="app-screen" class="hidden">
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="font-size: 32px;" id="sport-title">Loading...</h1>
                <p style="color: #94a3b8; font-size: 14px;" id="user-email"></p>
            </div>
            <div>
                <button onclick="changeSport()" class="btn-secondary" style="margin-right: 10px;">Change Sport</button>
                <button onclick="doSignOut()" class="btn-secondary">Sign Out</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 16px; font-size: 20px;">📊 Import Public Data</h3>
            <button onclick="fetchBovadaOdds()" class="btn-primary" style="margin-bottom: 16px;">🔄 Fetch Bovada Odds</button>
            
            <p style="color: #94a3b8; font-size: 13px; margin-bottom: 8px;">Paste SBD data:</p>
            <textarea id="sbd-text" rows="8" placeholder="Paste SBD public betting data here..."></textarea>
            
            <button onclick="importData()" class="btn-primary" style="width: 100%;">Process Data</button>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-size: 20px;">🎯 Contrarian Plays</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="sort-by" onchange="renderGames()" style="width: auto; padding: 8px 12px; background: rgba(15, 23, 42, 0.8);">
                        <option value="largest">Sort by Largest Gap</option>
                        <option value="spread">Sort by Spread Gap</option>
                        <option value="ml">Sort by ML Gap</option>
                    </select>
                    <button onclick="clearAllGames()" class="btn-secondary" style="padding: 8px 12px; font-size: 12px;">Clear All</button>
                </div>
            </div>
            <div id="games-list"></div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 16px;">📈 Results</h3>
            <div id="results-stats" style="margin-bottom: 16px;"></div>
            <div id="results-list"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB8EmsdGFvQLRRWev3zM8wzSXXhgWjHeO4",
    authDomain: "nba-tracker-641f0.firebaseapp.com",
    databaseURL: "https://nba-tracker-641f0-default-rtdb.firebaseio.com",
    projectId: "nba-tracker-641f0",
    storageBucket: "nba-tracker-641f0.firebasestorage.app",
    messagingSenderId: "29717054876",
    appId: "1:29717054876:web:fc4bf3d1242967fe857459"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const teamMappings = {
    'ATL': ['atlanta', 'hawks'], 'BOS': ['boston', 'celtics'], 'BKN': ['brooklyn', 'nets'], 'CHA': ['charlotte', 'hornets'], 'CHI': ['chicago', 'bulls'], 'CLE': ['cleveland', 'cavaliers', 'cavs'], 'DAL': ['dallas', 'mavericks', 'mavs'], 'DEN': ['denver', 'nuggets'], 'DET': ['detroit', 'pistons'], 'GSW': ['golden state', 'warriors'], 'HOU': ['houston', 'rockets'], 'IND': ['indiana', 'pacers'], 'LAC': ['clippers'], 'LAL': ['lakers'], 'MEM': ['memphis', 'grizzlies'], 'MIA': ['miami', 'heat'], 'MIL': ['milwaukee', 'bucks'], 'MIN': ['minnesota', 'timberwolves', 'wolves'], 'NOP': ['new orleans', 'pelicans'], 'NYK': ['knicks'], 'OKC': ['oklahoma', 'thunder'], 'ORL': ['orlando', 'magic'], 'PHI': ['philadelphia', 'sixers', '76ers'], 'PHX': ['phoenix', 'suns'], 'POR': ['portland', 'blazers'], 'SAC': ['sacramento', 'kings'], 'SAS': ['san antonio', 'spurs'], 'TOR': ['toronto', 'raptors'], 'UTA': ['utah', 'jazz'], 'WAS': ['washington', 'wizards']
};

function findTeamCode(teamText) {
    if (!teamText) return null;
    const upperText = teamText.toUpperCase().trim();
    if (teamMappings[upperText]) return upperText;
    const normalized = teamText.toLowerCase().replace(/[^a-z\s]/g, ' ').replace(/\s+/g, ' ').trim();
    for (const [code, variations] of Object.entries(teamMappings)) {
        for (const variation of variations) {
            if (normalized.includes(variation)) return code;
        }
    }
    return null;
}

let currentUser = null;
let currentSport = null;
let oddsApiKey = null;
let bovadaOdds = [];
let games = [];
let results = [];

function doSignIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(() => auth.signInWithRedirect(provider));
}

function doSignOut() { auth.signOut(); }

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('login-screen').classList.add('hidden');
        const savedSport = localStorage.getItem('selectedSport');
        const savedApiKey = localStorage.getItem('oddsApiKey');
        if (savedSport && savedApiKey) {
            currentSport = savedSport;
            oddsApiKey = savedApiKey;
            showMainApp();
        } else {
            document.getElementById('sport-selection-screen').classList.remove('hidden');
        }
        document.getElementById('user-email').textContent = user.email;
    } else {
        currentUser = null;
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('sport-selection-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.add('hidden');
    }
});

function selectSport(sport) {
    const apiKey = document.getElementById('odds-api-key').value.trim();
    if (!apiKey) { alert('Please enter your Odds API key'); return; }
    currentSport = sport;
    oddsApiKey = apiKey;
    localStorage.setItem('selectedSport', sport);
    localStorage.setItem('oddsApiKey', apiKey);
    showMainApp();
}

function changeSport() {
    localStorage.removeItem('selectedSport');
    localStorage.removeItem('oddsApiKey');
    document.getElementById('app-screen').classList.add('hidden');
    document.getElementById('sport-selection-screen').classList.remove('hidden');
}

function showMainApp() {
    document.getElementById('sport-selection-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    const sportNames = { 'basketball_nba': 'NBA', 'baseball_mlb': 'MLB', 'americanfootball_nfl': 'NFL', 'icehockey_nhl': 'NHL' };
    document.getElementById('sport-title').textContent = sportNames[currentSport] + ' Contrarian Tracker';
    loadData();
}

function loadData() {
    if (!currentUser) return;
    const sportKey = currentSport.replace('_', '-');
    db.ref(`games/${currentUser.uid}/${sportKey}`).on('value', snap => {
        games = [];
        snap.forEach(child => { games.push({ key: child.key, ...child.val() }); });
        renderGames();
    });
    db.ref(`results/${currentUser.uid}/${sportKey}`).on('value', snap => {
        results = [];
        snap.forEach(child => { results.push({ key: child.key, ...child.val() }); });
        renderResults();
    });
}

async function fetchBovadaOdds() {
    if (!oddsApiKey) { alert('❌ API key not found'); return; }
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '⏳ Fetching...';
    try {
        // FIX: Added oddsFormat=american
        const response = await fetch(`https://api.the-odds-api.com/v4/sports/${currentSport}/odds/?apiKey=${oddsApiKey}&regions=us&markets=spreads,h2h&bookmakers=bovada&oddsFormat=american`);
        if (!response.ok) throw new Error(`API Error: ${response.status}`);
        const data = await response.json();
        bovadaOdds = data;
        console.log('Bovada odds:', data);
        alert(`✅ Fetched ${data.length} games\n\nRemaining: ${response.headers.get('x-requests-remaining') || 'Unknown'}`);
    } catch (err) {
        alert('❌ Failed: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Fetch Bovada Odds';
    }
}

function calcImpliedProb(moneyline) {
    if (moneyline < 0) return (Math.abs(moneyline) / (Math.abs(moneyline) + 100)) * 100;
    return (100 / (moneyline + 100)) * 100;
}

function parseSBDData(text) {
    const teams = {};
    const lines = text.split('\n');
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        const logoMatch = line.match(/logo([A-Z]{2,4})/i);
        
        if (logoMatch) {
            const teamCode = logoMatch[1].toUpperCase();
            const collectedPcts = [];
            for (let j = i + 1; j < lines.length; j++) {
                const pctLine = lines[j].trim();
                const pctMatch = pctLine.match(/^(\d+)%$/);
                if (pctMatch) collectedPcts.push(parseFloat(pctMatch[1]));
                if (lines[j].match(/logo([A-Z]{2,4})/i)) break;
            }
            
            console.log(`Team ${teamCode}: ${collectedPcts.length} pcts:`, collectedPcts);
            
            if (collectedPcts.length >= 4) {
                if (!teams[teamCode]) teams[teamCode] = {};
                teams[teamCode].ml = collectedPcts[1];
                teams[teamCode].spread = collectedPcts[3];
            } else if (collectedPcts.length >= 2) {
                if (!teams[teamCode]) teams[teamCode] = {};
                if (teams[teamCode].first === undefined) {
                    teams[teamCode].first = collectedPcts[1];
                } else {
                    teams[teamCode].second = collectedPcts[1];
                }
            }
        }
    }
    
    for (const team in teams) {
        if (teams[team].first !== undefined && teams[team].second !== undefined) {
            teams[team].spread = teams[team].first;
            teams[team].ml = teams[team].second;
        } else if (teams[team].first !== undefined && teams[team].ml === undefined) {
            teams[team].spread = teams[team].first;
            teams[team].ml = teams[team].first;
        }
    }
    
    console.log('Final parsed teams:', teams);
    return teams;
}

function importData() {
    const sbdText = document.getElementById('sbd-text').value.trim();
    if (!sbdText) { alert('Please paste SBD data'); return; }
    if (bovadaOdds.length === 0) { alert('Please fetch Bovada odds first'); return; }
    
    const sbdData = parseSBDData(sbdText);
    const imported = [];
    
    for (const teamCode in sbdData) {
        const data = sbdData[teamCode];
        if (data.spread === undefined || data.ml === undefined) continue;
        
        const bovadaGame = findBovadaMatch(teamCode);
        if (!bovadaGame) continue;
        
        imported.push({
            team: teamCode,
            spreadMoney: data.spread,
            mlMoney: data.ml,
            bovadaSpread: bovadaGame.spread,
            bovadaML: bovadaGame.moneyline
        });
    }
    
    if (imported.length === 0) {
        alert(`❌ No matches found\n\nSBD teams: ${Object.keys(sbdData).join(', ')}\nBovada games: ${bovadaOdds.length}`);
        return;
    }
    
    const sportKey = currentSport.replace('_', '-');
    imported.forEach(game => {
        const spreadGap = 50 - game.spreadMoney;
        const mlImplied = calcImpliedProb(game.bovadaML);
        const mlGap = mlImplied - game.mlMoney;
        
        db.ref(`games/${currentUser.uid}/${sportKey}`).push({
            team: game.team,
            spreadMoney: game.spreadMoney,
            mlMoney: game.mlMoney,
            bovadaSpread: game.bovadaSpread,
            bovadaML: game.bovadaML,
            spreadGap: Math.round(spreadGap * 10) / 10,
            mlGap: Math.round(mlGap * 10) / 10,
            timestamp: Date.now()
        });
    });
    
    alert(`✅ Imported ${imported.length} games`);
    document.getElementById('sbd-text').value = '';
}

// FIXED: Match by team name, not index
function findBovadaMatch(sbdTeam) {
    const teamCode = findTeamCode(sbdTeam);
    if (!teamCode) return null;
    
    for (let game of bovadaOdds) {
        const homeCode = findTeamCode(game.home_team);
        const awayCode = findTeamCode(game.away_team);
        
        if (teamCode === homeCode || teamCode === awayCode) {
            const bovada = game.bookmakers?.find(b => b.key === 'bovada');
            if (!bovada) continue;
            const spreads = bovada.markets.find(m => m.key === 'spreads');
            const h2h = bovada.markets.find(m => m.key === 'h2h');
            if (!spreads || !h2h) continue;
            
            const targetTeamName = teamCode === homeCode ? game.home_team : game.away_team;
            
            // FIX: Find outcome by name match instead of index
            const spreadOutcome = spreads.outcomes.find(o => o.name === targetTeamName);
            const mlOutcome = h2h.outcomes.find(o => o.name === targetTeamName);
            
            if (!spreadOutcome || !mlOutcome) continue;
            
            return {
                spread: spreadOutcome.point || 0,
                moneyline: mlOutcome.price || 0
            };
        }
    }
    return null;
}

function renderGames() {
    const sortBy = document.getElementById('sort-by')?.value || 'largest';
    const sorted = [...games].sort((a, b) => {
        if (sortBy === 'spread') return Math.abs(b.spreadGap || 0) - Math.abs(a.spreadGap || 0);
        if (sortBy === 'ml') return Math.abs(b.mlGap || 0) - Math.abs(a.mlGap || 0);
        const aMax = Math.max(Math.abs(a.spreadGap || 0), Math.abs(a.mlGap || 0));
        const bMax = Math.max(Math.abs(b.spreadGap || 0), Math.abs(b.mlGap || 0));
        return bMax - aMax;
    });
    const html = sorted.map(game => {
        const spreadClass = game.spreadGap > 0 ? 'gap-positive' : 'gap-negative';
        const mlClass = game.mlGap > 0 ? 'gap-positive' : 'gap-negative';
        return `<div class="game-card"><div style="display: flex; justify-content: space-between; align-items: center;"><div><h3 style="font-size: 22px; margin-bottom: 8px;">${game.team}</h3><div style="color: #94a3b8; font-size: 13px;">Bovada: ${game.bovadaSpread > 0 ? '+' : ''}${game.bovadaSpread} / ${game.bovadaML > 0 ? '+' : ''}${game.bovadaML}</div></div><div style="text-align: right;"><div style="margin-bottom: 8px;"><span style="color: #94a3b8; font-size: 12px;">SPREAD:</span><span class="gap-display ${spreadClass}">${game.spreadGap > 0 ? '+' : ''}${game.spreadGap}</span></div><div><span style="color: #94a3b8; font-size: 12px;">ML:</span><span class="gap-display ${mlClass}">${game.mlGap > 0 ? '+' : ''}${game.mlGap}</span></div></div></div><div style="margin-top: 12px; display: flex; gap: 10px;"><button onclick="logResult('${game.key}', 'win')" class="btn-primary" style="flex: 1;">✅ Win</button><button onclick="logResult('${game.key}', 'loss')" class="btn-secondary" style="flex: 1;">❌ Loss</button><button onclick="deleteGame('${game.key}')" class="btn-secondary">🗑️</button></div></div>`;
    }).join('');
    document.getElementById('games-list').innerHTML = html || '<p style="color: #64748b; text-align: center; padding: 40px;">No games yet</p>';
}

function logResult(gameKey, outcome) {
    const game = games.find(g => g.key === gameKey);
    if (!game) return;
    const sportKey = currentSport.replace('_', '-');
    db.ref(`results/${currentUser.uid}/${sportKey}`).push({
        team: game.team, spreadGap: game.spreadGap, mlGap: game.mlGap, outcome, timestamp: Date.now()
    });
    deleteGame(gameKey);
}

function deleteGame(gameKey) {
    const sportKey = currentSport.replace('_', '-');
    db.ref(`games/${currentUser.uid}/${sportKey}/${gameKey}`).remove();
}

function clearAllGames() {
    if (!confirm('Delete all games?')) return;
    const sportKey = currentSport.replace('_', '-');
    db.ref(`games/${currentUser.uid}/${sportKey}`).remove();
}

function renderResults() {
    const wins = results.filter(r => r.outcome === 'win').length;
    const losses = results.filter(r => r.outcome === 'loss').length;
    const total = wins + losses;
    const winRate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
    document.getElementById('results-stats').innerHTML = `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center;"><div style="background: rgba(16, 185, 129, 0.1); border-radius: 12px; padding: 16px;"><div style="font-size: 28px; font-weight: 700; color: #10b981;">${wins}</div><div style="color: #94a3b8; font-size: 12px;">WINS</div></div><div style="background: rgba(239, 68, 68, 0.1); border-radius: 12px; padding: 16px;"><div style="font-size: 28px; font-weight: 700; color: #ef4444;">${losses}</div><div style="color: #94a3b8; font-size: 12px;">LOSSES</div></div><div style="background: rgba(59, 130, 246, 0.1); border-radius: 12px; padding: 16px;"><div style="font-size: 28px; font-weight: 700; color: #3b82f6;">${winRate}%</div><div style="color: #94a3b8; font-size: 12px;">WIN RATE</div></div></div>`;
    const recent = [...results].reverse().slice(0, 10);
    document.getElementById('results-list').innerHTML = recent.map(r => `<div style="display: flex; justify-content: space-between; padding: 12px; background: rgba(15, 23, 42, 0.4); border-radius: 8px; margin: 8px 0;"><span>${r.team}</span><span style="color: ${r.outcome === 'win' ? '#10b981' : '#ef4444'};">${r.outcome === 'win' ? '✅ Win' : '❌ Loss'}</span></div>`).join('') || '<p style="color: #64748b; text-align: center;">No results yet</p>';
}
</script>
</body>
</html>
